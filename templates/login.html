<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Read Gold — Вход</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #0d0d0d;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            color: #fff;
        }
        .card {
            background: rgba(30, 25, 20, 0.95);
            border: 1px solid #b8960c44;
            border-radius: 16px;
            padding: 40px;
            width: 380px;
            text-align: center;
        }
        h1 { color: #d4a017; font-size: 2rem; margin-bottom: 6px; }
        p { color: #aaa; font-size: 0.9rem; margin-bottom: 24px; }
        .input-group { text-align: left; margin-bottom: 16px; }
        label { font-size: 0.85rem; color: #ccc; display: block; margin-bottom: 6px; }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            font-size: 0.95rem;
            outline: none;
        }
        input:focus { border-color: #d4a017; }
        .remember {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            color: #aaa;
        }
        button {
            width: 100%;
            padding: 13px;
            background: #d4a017;
            color: #000;
            font-weight: bold;
            font-size: 1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        button:hover { background: #e6b520; }
        .flash { color: #ff4444; font-size: 0.85rem; margin-bottom: 12px; }
        .divider { color: #444; margin: 16px 0; }
        a { color: #d4a017; text-decoration: none; font-weight: bold; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <h1>📖 Read Gold</h1>
        <p>Добро пожаловать!<br>Войдите в свой аккаунт</p>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="flash">{{ messages[0] }}</div>
            {% endif %}
        {% endwith %}

        <form method="POST" action="/login">
            <div class="input-group">
                <label>Логин</label>
                <input type="text" name="username" placeholder="Введите логин" required>
            </div>
            <div class="input-group">
                <label>Пароль</label>
                <input type="password" name="password" placeholder="Введите пароль" required>
            </div>
            <div class="remember">
                <input type="checkbox" name="remember" id="remember">
                <label for="remember">Запомнить меня</label>
            </div>
            <button type="submit">Войти</button>
        </form>

        <div class="divider">или</div>
        <p>Ещё нет аккаунта? <a href="/register">Зарегистрируйтесь</a></p>
    </div>
</body>
</html>
