<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Read Gold — Регистрация</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #0d0d0d;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            color: #fff;
        }

        .card {
            background: rgba(30, 25, 20, 0.95);
            border: 1px solid #b8960c44;
            border-radius: 16px;
            padding: 40px;
            width: 380px;
            text-align: center;
        }

        h1 { color: #d4a017; font-size: 2rem; margin-bottom: 6px; }
        p { color: #aaa; font-size: 0.9rem; margin-bottom: 24px; }

        .input-group { text-align: left; margin-bottom: 16px; }
        label { font-size: 0.85rem; color: #ccc; display: block; margin-bottom: 6px; }

        input {
            width: 100%;
            padding: 12px 16px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            font-size: 0.95rem;
            outline: none;
        }

        input:focus { border-color: #d4a017; }

        button {
            width: 100%;
            padding: 13px;
            background: #d4a017;
            color: #000;
            font-weight: bold;
            font-size: 1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 8px;
        }

        button:hover { background: #e6b520; }

        .flash { color: #ff4444; font-size: 0.85rem; margin-bottom: 12px; }
        a { color: #d4a017; text-decoration: none; font-weight: bold; }
        a:hover { text-decoration: underline; }
        .divider { color: #444; margin: 16px 0; }
    </style>
</head>
<body>
    <div class="card">
        <h1>📖 Read Gold</h1>
        <p>Создайте аккаунт</p>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="flash">{{ messages[0] }}</div>
            {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="input-group">
                <label>Логин</label>
                <input type="text" name="username" placeholder="Придумайте логин" required>
            </div>
            <div class="input-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="Введите email" required>
            </div>
            <div class="input-group">
                <label>Пароль</label>
                <input type="password" name="password" placeholder="Придумайте пароль" required>
            </div>
            <button type="submit">Зарегистрироваться</button>
        </form>

        <div class="divider">или</div>
        <p>Уже есть аккаунт? <a href="/">Войти</a></p>
    </div>
</body>
</html>
